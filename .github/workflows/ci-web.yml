name: CI Web

on:
  push:
    branches: [main]
    paths:
      - "games/**"
      - "!games/godot/**"
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "vite.shared.js"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "games/**"
      - "!games/godot/**"
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "vite.shared.js"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-web.yml"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
