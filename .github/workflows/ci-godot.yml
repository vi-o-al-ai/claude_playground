name: CI Godot

on:
  push:
    branches: [main]
    paths:
      - "games/runner/**"
      - ".github/workflows/ci-godot.yml"
  pull_request:
    branches: [main]
    paths:
      - "games/runner/**"
      - ".github/workflows/ci-godot.yml"

jobs:
  test-godot:
    name: Godot Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
      - name: Import project
        run: |
          cd games/runner
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true
      - name: Run GUT tests
        run: |
          cd games/runner
          godot --headless -s res://addons/gut/gut_cmdln.gd 2>&1
