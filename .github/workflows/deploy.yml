name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web Games
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PAGES_BASE: /claude_playground
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-games
          path: |
            games/*/dist/
            apps/*/dist/

  build-godot:
    name: Build Godot Games
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4

      - name: Import Godot project
        run: |
          cd games/runner
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p games/runner/web
          cd games/runner
          godot --headless --export-release "Web" web/index.html 2>&1

      - name: Upload Godot build
        uses: actions/upload-artifact@v4
        with:
          name: godot-games
          path: games/runner/web/

  assemble:
    name: Assemble Site
    needs: [build-web, build-godot]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            games
            apps

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-games
          path: .

      - name: Download Godot build
        uses: actions/download-artifact@v4
        with:
          name: godot-games
          path: godot-export

      - name: Assemble site
        run: |
          mkdir _site
          # Copy Vite-built games and apps
          for pkg in games/*/ apps/*/; do
            name=$(basename "$pkg")
            if [ -d "$pkg/dist" ]; then
              cp -r "$pkg/dist" "_site/$name"
            fi
          done
          # Copy Godot-exported game
          if [ -d "godot-export" ]; then
            cp -r godot-export _site/runner
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
