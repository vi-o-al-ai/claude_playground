name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "games/**"
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "vite.shared.js"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web Games
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PAGES_BASE: /claude_playground
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-games
          path: |
            games/web/*/dist/
            apps/web/*/dist/

  build-godot:
    name: Build Godot Games
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATE_DIR="/github/home/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.zip
          unzip -q /tmp/templates.zip -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATE_DIR/"

      - name: Import Godot projects
        run: |
          for project in runner crowd-runner; do
            cd "games/godot/$project"
            godot --headless --import 2>&1 || true
            godot --headless --import 2>&1 || true
            cd - > /dev/null
          done

      - name: Export to Web
        run: |
          for project in runner crowd-runner; do
            mkdir -p "games/godot/$project/web"
            cd "games/godot/$project"
            godot --headless --export-release "Web" web/index.html 2>&1
            cd - > /dev/null
          done

      - name: Stage Godot builds for upload
        run: |
          mkdir -p godot-out
          cp -r games/godot/runner/web godot-out/runner
          cp -r games/godot/crowd-runner/web godot-out/crowd-runner

      - name: Upload Godot build
        uses: actions/upload-artifact@v4
        with:
          name: godot-games
          path: godot-out/

  assemble:
    name: Assemble Site
    needs: [build-web, build-godot]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            games
            apps

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-games
          path: .

      - name: Download Godot build
        uses: actions/download-artifact@v4
        with:
          name: godot-games
          path: godot-export

      - name: Assemble site
        run: |
          mkdir _site
          # Copy Vite-built games and apps
          for pkg in games/web/*/ apps/web/*/; do
            name=$(basename "$pkg")
            if [ -d "$pkg/dist" ]; then
              cp -r "$pkg/dist" "_site/$name"
            fi
          done
          # Copy Godot-exported games (one subdir per project).
          for project_dir in godot-export/*/; do
            name=$(basename "$project_dir")
            cp -r "$project_dir" "_site/$name"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
