<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solitaire</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #1a6b1a;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        user-select: none;
      }

      #app {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        color: #fff;
      }

      header h1 {
        font-size: 1.4rem;
        letter-spacing: 2px;
      }

      #stats {
        font-size: 0.85rem;
        opacity: 0.85;
      }

      .btn {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.15s;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.35);
      }

      /* Top row: stock + waste + foundations */
      #top-row {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        align-items: flex-start;
      }

      #foundations {
        display: flex;
        gap: 10px;
        margin-left: auto;
      }

      /* Card & pile sizing */
      :root {
        --cw: 100px;
        --ch: 140px;
        --radius: 8px;
      }

      .pile-slot {
        width: var(--cw);
        height: var(--ch);
        border-radius: var(--radius);
        border: 2px dashed rgba(255, 255, 255, 0.35);
        position: relative;
        flex-shrink: 0;
      }

      /* Tableau */
      #tableau {
        display: flex;
        gap: 10px;
      }

      .tableau-col {
        width: var(--cw);
        position: relative;
        min-height: var(--ch);
        flex-shrink: 0;
      }

      /* Cards */
      .card {
        width: var(--cw);
        height: var(--ch);
        border-radius: var(--radius);
        position: absolute;
        cursor: pointer;
        border: 1px solid #bbb;
        box-shadow: 1px 2px 5px rgba(0, 0, 0, 0.4);
        transition: box-shadow 0.1s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 5px;
        font-size: 1rem;
        font-weight: bold;
      }

      .card.face-down {
        background: repeating-linear-gradient(
          45deg,
          #1455a4,
          #1455a4 6px,
          #1a69c9 6px,
          #1a69c9 12px
        );
        cursor: default;
      }

      .card.face-up {
        background: #fff;
      }

      .card.red {
        color: #c0392b;
      }
      .card.black {
        color: #1a1a1a;
      }

      .card .top-label {
        text-align: left;
        line-height: 1;
      }
      .card .bottom-label {
        text-align: right;
        transform: rotate(180deg);
        line-height: 1;
      }
      .card .suit-center {
        text-align: center;
        font-size: 2rem;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card.dragging {
        opacity: 0.7;
        z-index: 1000;
        box-shadow: 4px 8px 20px rgba(0, 0, 0, 0.6);
      }

      .card.drag-over {
        box-shadow:
          0 0 0 3px #ffe566,
          1px 2px 5px rgba(0, 0, 0, 0.4);
      }
      .pile-slot.drag-over {
        border-color: #ffe566;
        border-style: solid;
      }

      /* Stock pile */
      #stock {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #stock:empty::after,
      #stock.empty::after {
        content: "↺";
        font-size: 2rem;
        color: rgba(255, 255, 255, 0.5);
      }

      /* Win overlay */
      #win-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        color: #fff;
      }
      #win-overlay.show {
        display: flex;
      }
      #win-overlay h2 {
        font-size: 3rem;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }
      #win-overlay p {
        font-size: 1.1rem;
        opacity: 0.85;
      }

      @media (max-width: 720px) {
        :root {
          --cw: 72px;
          --ch: 100px;
        }
        .card {
          font-size: 0.75rem;
          padding: 3px;
        }
        .card .suit-center {
          font-size: 1.4rem;
        }
        #app {
          padding: 8px;
        }
        #top-row,
        #tableau {
          gap: 6px;
        }
        #foundations {
          gap: 6px;
        }
      }

      @media (max-width: 520px) {
        :root {
          --cw: 52px;
          --ch: 74px;
        }
        .card {
          font-size: 0.6rem;
          padding: 2px;
        }
        .card .suit-center {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>SOLITAIRE</h1>
        <div id="stats">
          Moves:
          <span id="move-count">0</span>
          &nbsp; Time:
          <span id="timer">0:00</span>
        </div>
        <button class="btn" onclick="newGame()">New Game</button>
      </header>

      <div id="top-row">
        <div class="pile-slot" id="stock"></div>
        <div class="pile-slot" id="waste"></div>
        <div id="foundations">
          <div class="pile-slot foundation" id="f0" data-suit=""></div>
          <div class="pile-slot foundation" id="f1" data-suit=""></div>
          <div class="pile-slot foundation" id="f2" data-suit=""></div>
          <div class="pile-slot foundation" id="f3" data-suit=""></div>
        </div>
      </div>

      <div id="tableau">
        <div class="tableau-col" id="t0"></div>
        <div class="tableau-col" id="t1"></div>
        <div class="tableau-col" id="t2"></div>
        <div class="tableau-col" id="t3"></div>
        <div class="tableau-col" id="t4"></div>
        <div class="tableau-col" id="t5"></div>
        <div class="tableau-col" id="t6"></div>
      </div>
    </div>

    <div id="win-overlay">
      <h2>You Win!</h2>
      <p id="win-stats"></p>
      <button class="btn" style="font-size: 1rem; padding: 10px 28px" onclick="newGame()">
        Play Again
      </button>
    </div>

    <script type="module" src="./src/ui.js"></script>
  </body>
</html>
