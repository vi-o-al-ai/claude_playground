<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Invaders</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Courier New", monospace;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #0f0;
        text-align: center;
        z-index: 10;
        display: none;
      }
      #overlay h1 {
        font-size: 48px;
        margin-bottom: 16px;
      }
      #overlay p {
        font-size: 20px;
        color: #0a0;
      }
      #overlay button {
        margin-top: 24px;
        background: none;
        border: 2px solid #0f0;
        color: #0f0;
        padding: 12px 36px;
        font-size: 20px;
        font-family: "Courier New", monospace;
        cursor: pointer;
      }
      #overlay button:hover {
        background: #0f0;
        color: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1 id="overlay-title"></h1>
      <p id="overlay-sub"></p>
      <button id="overlay-btn" onclick="startGame()">PLAY</button>
    </div>

    <script type="module" src="./src/ui.js"></script>
  </body>
</html>
