<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: #fff;
      }
      .container {
        text-align: center;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        letter-spacing: 2px;
      }
      .status {
        font-size: 1.3rem;
        margin-bottom: 1.5rem;
        min-height: 2rem;
        color: #a8e6cf;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        gap: 8px;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      .cell {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        font-size: 3rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cell:hover:not(.taken) {
        background: rgba(255, 255, 255, 0.15);
        transform: scale(1.05);
      }
      .cell.taken {
        cursor: default;
      }
      .cell.x {
        color: #ff6b6b;
      }
      .cell.o {
        color: #4ecdc4;
      }
      .cell.win-cell {
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }
      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        padding: 0.7rem 1.8rem;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.15s,
          opacity 0.2s;
      }
      button:hover {
        transform: scale(1.05);
      }
      .btn-restart {
        background: #a8e6cf;
        color: #1a1a2e;
      }
      .btn-mode {
        background: #ffd93d;
        color: #1a1a2e;
      }
      .scoreboard {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
      }
      .score-x {
        color: #ff6b6b;
      }
      .score-o {
        color: #4ecdc4;
      }
      .score-d {
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="scoreboard">
        <span class="score-x">
          X:
          <span id="score-x">0</span>
        </span>
        <span class="score-d">
          Draw:
          <span id="score-d">0</span>
        </span>
        <span class="score-o">
          O:
          <span id="score-o">0</span>
        </span>
      </div>
      <div class="status" id="status">X's turn</div>
      <div class="board" id="board"></div>
      <div class="controls">
        <button class="btn-restart" onclick="restart()">New Game</button>
        <button class="btn-mode" id="mode-btn" onclick="toggleMode()">vs Computer</button>
      </div>
    </div>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
