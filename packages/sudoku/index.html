<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Sudoku</h1>
        <div id="difficulty-selector">
          <button class="diff-btn active" data-difficulty="easy">Easy</button>
          <button class="diff-btn" data-difficulty="medium">Medium</button>
          <button class="diff-btn" data-difficulty="hard">Hard</button>
          <button class="diff-btn" data-difficulty="expert">Expert</button>
        </div>
      </header>

      <div id="game-area">
        <div id="game-info">
          <span id="timer">00:00</span>
          <span id="mistakes-counter">Mistakes: 0 / 3</span>
        </div>

        <div id="board-container">
          <div id="board"></div>
        </div>

        <div id="numpad">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>
          <button class="num-btn" data-num="7">7</button>
          <button class="num-btn" data-num="8">8</button>
          <button class="num-btn" data-num="9">9</button>
        </div>

        <div id="controls">
          <button id="btn-undo" title="Undo">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 10h10a5 5 0 0 1 0 10H9" />
              <path d="M3 10l4-4" />
              <path d="M3 10l4 4" />
            </svg>
            <span>Undo</span>
          </button>
          <button id="btn-erase" title="Erase">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 20H7L3 16l9-9 8 8-4 4" />
              <path d="M18 13l-6-6" />
            </svg>
            <span>Erase</span>
          </button>
          <button id="btn-notes" title="Notes mode">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            <span>Notes</span>
          </button>
          <button id="btn-hint" title="Hint">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <circle cx="12" cy="17" r=".5" />
            </svg>
            <span>
              Hint
              <span id="hint-count">(3)</span>
            </span>
          </button>
        </div>

        <div id="actions">
          <button id="btn-new">New Game</button>
          <button id="btn-save">Save</button>
          <button id="btn-load">Resume</button>
          <button id="btn-share">Share</button>
        </div>
      </div>

      <div id="modal-overlay" class="hidden">
        <div id="modal">
          <div id="modal-content"></div>
          <div id="modal-actions"></div>
        </div>
      </div>
    </div>

    <script src="sudoku.js"></script>
    <script src="game.js"></script>
  </body>
</html>
