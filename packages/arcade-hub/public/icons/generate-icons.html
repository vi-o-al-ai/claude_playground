<!--
  Open this file in a browser to generate PWA icons.
  Right-click each canvas and "Save Image As" to save the PNGs.
  Then delete this file.
-->
<!doctype html>
<html>
  <body>
    <h3>192x192</h3>
    <canvas id="c192" width="192" height="192"></canvas>
    <h3>512x512</h3>
    <canvas id="c512" width="512" height="512"></canvas>
    <script>
      function drawIcon(canvas) {
        const ctx = canvas.getContext("2d");
        const s = canvas.width;

        // Background
        ctx.fillStyle = "#0f0f23";
        ctx.fillRect(0, 0, s, s);

        // Gradient border
        const grad = ctx.createLinearGradient(0, 0, s, s);
        grad.addColorStop(0, "#00d4ff");
        grad.addColorStop(0.5, "#7b2ff7");
        grad.addColorStop(1, "#ff2d95");
        ctx.strokeStyle = grad;
        ctx.lineWidth = s * 0.04;
        ctx.strokeRect(s * 0.06, s * 0.06, s * 0.88, s * 0.88);

        // Text
        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${s * 0.22}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("AI", s * 0.5, s * 0.38);

        ctx.font = `${s * 0.1}px sans-serif`;
        ctx.fillStyle = "#888888";
        ctx.fillText("ARCADE", s * 0.5, s * 0.62);
      }

      drawIcon(document.getElementById("c192"));
      drawIcon(document.getElementById("c512"));
    </script>
  </body>
</html>
